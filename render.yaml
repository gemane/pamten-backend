services:
  - type: web
    name: ownership-platform-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ARCADEDB_URL
        sync: false
      - key: ARCADEDB_USERNAME
        sync: false
      - key: ARCADEDB_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://pamten-frontend.onrender.com
